<svg width="100%" viewBox="0 0 680 200" role="img" style="max-width: 680px; display: block; margin-inline: auto;">
  <title>Дорожная техника</title>
  <desc>Четыре SVG иконки: самосвал, перегружатель смеси, асфальтоукладчик, каток гладковальцовый</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </marker>
  </defs>

  <!-- ======== 1. САМОСВАЛ ======== -->
  <!-- Кабина -->
  <rect x="22" y="80" width="36" height="34" rx="4" fill="#E8A020" stroke="#8B5E10" stroke-width="1.2"></rect>
  <!-- Лобовое стекло -->
  <rect x="26" y="84" width="22" height="14" rx="2" fill="#AED6F1" stroke="#1A5276" stroke-width="0.8"></rect>
  <!-- Кузов самосвала (поднятый) -->
  <polygon points="56,60 110,60 110,114 56,114" fill="#E8A020" stroke="#8B5E10" stroke-width="1.2"></polygon>
  <!-- Груз (грунт) внутри -->
  <polygon points="58,62 108,62 108,82 58,82" fill="#A0522D"></polygon>
  <!-- Рама шасси -->
  <rect x="18" y="114" width="96" height="8" rx="2" fill="#5D5D5D" stroke="#333" stroke-width="1"></rect>
  <!-- Колёса -->
  <circle cx="36" cy="128" r="11" fill="#2C2C2C" stroke="#555" stroke-width="1"></circle>
  <circle cx="36" cy="128" r="5" fill="#888"></circle>
  <circle cx="88" cy="128" r="11" fill="#2C2C2C" stroke="#555" stroke-width="1"></circle>
  <circle cx="88" cy="128" r="5" fill="#888"></circle>
  <circle cx="104" cy="128" r="11" fill="#2C2C2C" stroke="#555" stroke-width="1"></circle>
  <circle cx="104" cy="128" r="5" fill="#888"></circle>
  <!-- Гидроцилиндр -->
  <line x1="68" y1="85" x2="68" y2="114" stroke="#888" stroke-width="3" stroke-linecap="round"></line>
  <!-- Подпись -->
  <text x="64" y="158" text-anchor="middle" class="ts" fill="var(--color-text-secondary)">Самосвал</text>

  <!-- ======== 2. ПЕРЕГРУЖАТЕЛЬ СМЕСИ ======== -->
  <!-- Рама -->
  <rect x="178" y="100" width="100" height="18" rx="3" fill="#4A7FA5" stroke="#2C4F6B" stroke-width="1.2"></rect>
  <!-- Основной бункер -->
  <rect x="188" y="72" width="60" height="30" rx="4" fill="#4A7FA5" stroke="#2C4F6B" stroke-width="1.2"></rect>
  <!-- Ковш/лоток приёма (спереди) -->
  <polygon points="168,85 188,80 188,108 168,108" fill="#357599" stroke="#2C4F6B" stroke-width="1"></polygon>
  <!-- Конвейер (задний) -->
  <rect x="248" y="84" width="38" height="8" rx="3" fill="#2C5F7A" stroke="#1A3D50" stroke-width="1"></rect>
  <ellipse cx="252" cy="88" rx="5" ry="5" fill="#1A3D50"></ellipse>
  <ellipse cx="282" cy="88" rx="5" ry="5" fill="#1A3D50"></ellipse>
  <!-- Кабина оператора -->
  <rect x="224" y="60" width="24" height="22" rx="3" fill="#5B8FB9" stroke="#2C4F6B" stroke-width="1"></rect>
  <rect x="227" y="63" width="14" height="9" rx="1.5" fill="#AED6F1" stroke="#1A5276" stroke-width="0.7"></rect>
  <!-- Колёса -->
  <circle cx="198" cy="124" r="11" fill="#2C2C2C" stroke="#555" stroke-width="1"></circle>
  <circle cx="198" cy="124" r="5" fill="#888"></circle>
  <circle cx="258" cy="124" r="11" fill="#2C2C2C" stroke="#555" stroke-width="1"></circle>
  <circle cx="258" cy="124" r="5" fill="#888"></circle>
  <!-- Подпись -->
  <text x="228" y="150" text-anchor="middle" class="ts" fill="var(--color-text-secondary)">Перегружатель</text>

  <!-- ======== 3. АСФАЛЬТОУКЛАДЧИК ======== -->
  <!-- Корпус -->
  <rect x="358" y="78" width="90" height="32" rx="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.2"></rect>
  <!-- Бункер спереди -->
  <polygon points="340,82 360,76 360,112 340,112" fill="#388E3C" stroke="#1B5E20" stroke-width="1"></polygon>
  <!-- Кабина -->
  <rect x="398" y="58" width="28" height="24" rx="3" fill="#43A047" stroke="#1B5E20" stroke-width="1"></rect>
  <rect x="402" y="62" width="16" height="10" rx="1.5" fill="#AED6F1" stroke="#1A5276" stroke-width="0.7"></rect>
  <!-- Выглаживающая плита (шире корпуса) -->
  <rect x="343" y="112" width="110" height="8" rx="2" fill="#1B5E20" stroke="#0D3B12" stroke-width="1"></rect>
  <!-- Гусеницы -->
  <rect x="356" y="120" width="36" height="14" rx="4" fill="#333" stroke="#555" stroke-width="1"></rect>
  <rect x="402" y="120" width="36" height="14" rx="4" fill="#333" stroke="#555" stroke-width="1"></rect>
  <!-- Звёздочки гусениц -->
  <circle cx="362" cy="127" r="4" fill="#666"></circle>
  <circle cx="386" cy="127" r="4" fill="#666"></circle>
  <circle cx="408" cy="127" r="4" fill="#666"></circle>
  <circle cx="432" cy="127" r="4" fill="#666"></circle>
  <!-- Асфальт под укладчиком -->
  <rect x="330" y="134" width="126" height="6" rx="1" fill="#333" opacity="0.7"></rect>
  <!-- Подпись -->
  <text x="403" y="155" text-anchor="middle" class="ts" fill="var(--color-text-secondary)">Укладчик</text>

  <!-- ======== 4. КАТОК ГЛАДКОВАЛЬЦОВЫЙ ======== -->
  <!-- Рама -->
  <rect x="520" y="90" width="120" height="16" rx="3" fill="#B71C1C" stroke="#7B0000" stroke-width="1.2"></rect>
  <!-- Кабина оператора -->
  <rect x="564" y="65" width="34" height="28" rx="3" fill="#C62828" stroke="#7B0000" stroke-width="1.2"></rect>
  <rect x="568" y="69" width="22" height="12" rx="2" fill="#AED6F1" stroke="#1A5276" stroke-width="0.7"></rect>
  <!-- Вальцы (передний и задний) -->
  <!-- Передний валец -->
  <ellipse cx="536" cy="116" rx="22" ry="22" fill="#8B1A1A" stroke="#5B0000" stroke-width="1.5"></ellipse>
  <ellipse cx="536" cy="116" rx="14" ry="14" fill="#7B1818" stroke="#5B0000" stroke-width="0.8"></ellipse>
  <ellipse cx="536" cy="116" rx="6" ry="6" fill="#5B0000"></ellipse>
  <!-- Задний валец -->
  <ellipse cx="624" cy="116" rx="22" ry="22" fill="#8B1A1A" stroke="#5B0000" stroke-width="1.5"></ellipse>
  <ellipse cx="624" cy="116" rx="14" ry="14" fill="#7B1818" stroke="#5B0000" stroke-width="0.8"></ellipse>
  <ellipse cx="624" cy="116" rx="6" ry="6" fill="#5B0000"></ellipse>
  <!-- Полосы уплотнения -->
  <line x1="514" y1="138" x2="646" y2="138" stroke="#555" stroke-width="2" stroke-linecap="round"></line>
  <!-- Подпись -->
  <text x="580" y="155" text-anchor="middle" class="ts" fill="var(--color-text-secondary)">Каток</text>

  <!-- Заголовки под иконками -->
  <text x="64" y="172" text-anchor="middle" class="ts" fill="var(--color-text-tertiary)">1</text>
  <text x="228" y="172" text-anchor="middle" class="ts" fill="var(--color-text-tertiary)">2</text>
  <text x="403" y="172" text-anchor="middle" class="ts" fill="var(--color-text-tertiary)">3</text>
  <text x="580" y="172" text-anchor="middle" class="ts" fill="var(--color-text-tertiary)">4</text>
</svg>
